<!DOCTYPE html>
<html>
<head>
    <title>HPLC Predictor</title>
</head>
<body>

<h2>HPLC Compound Predictor</h2>

<label>Solvent Proportion (φ):</label>
<input type="number" id="phi" step="0.1"><br><br>

<label>Retention Time (Rt):</label>
<input type="number" id="rt" step="0.1"><br><br>

<button onclick="predict()">Predict</button>

<h3>Results:</h3>
<pre id="output"></pre>

<script>
function predict() {
    const phi = parseFloat(document.getElementById("phi").value);
    const rt = parseFloat(document.getElementById("rt").value);

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ phi, rt })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText =
            JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
